<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Public - RumbleDB</title>

    <style>
        body {
            font-family: liberation sans, Myriad, Bitstream Vera Sans, sans-serif;
            text-align: center;
        }

        h1, h2 {
            color: #336699;
        }

        #query, #results {
            width: 44vw;
            max-width: 600px;
        }
    </style>

    <script>
        function rumbleEvaluate() {
            const resultsElement = document.getElementById('results');
            const query = document.getElementById('query').value;
            const button = document.querySelector('button[type="submit"]');
            const buttonText = button.textContent;

            button.disabled = true;
            button.textContent = 'Evaluating…';
            resultsElement.value = '';

            fetch('/jsoniq', { method: 'POST', body: query })
                .then(response => response.json())
                .then(data => {
                    if (data.values) {
                        resultsElement.value = data.values.map(x => JSON.stringify(x)).join('\n');
                    } else if (data['error-message']) {
                        resultsElement.value = data['error-message'];
                    }
                })
                .catch(err => {
                    resultsElement.value = 'Network error: ' + err.message;
                })
                .finally(() => {
                    button.disabled = false;
                    button.textContent = buttonText;
                });

            return false;
        }
    </script>
</head>

<body>

<h1 style="font-weight: bold">RumbleDB</h1>

<form onsubmit="return rumbleEvaluate()">
    <div style="margin: auto">
        <div style="display: inline-block;">

            <div style="float: left;">
                <h2 style="margin-top: 0">JSONiq query</h2>
                <textarea id="query" spellcheck="false" placeholder="Type your query here" rows="20" required
                          style="display: block; margin: 20px" aria-label="JSONiq query">1 + 1</textarea>
            </div>

            <div style="float: right">
                <h2 style="margin-top: 0">Results</h2>
                <textarea id="results" placeholder="Results" rows="20" readonly
                          style="display: block; margin: 20px" aria-label="Results"></textarea>
            </div>

        </div>
    </div>

    <button type="submit" style="margin: 0 auto; padding: 10px">
        Evaluate with RumbleDB 2.1.0
    </button>
</form>

</body>
</html>
