<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSound validator - RumbleDB</title>

    <style>
        body {
            font-family: liberation sans, Myriad, Bitstream Vera Sans, sans-serif;
            text-align: center;
        }

        h1, h2 {
            color: #336699;
        }

        #result {
            border: solid 3px #ccc;
        }

        #result.valid {
            border-color: #017801;
        }

        #result.invalid {
            border-color: #c10101;
        }

        #schema, #instance {
            width: 44vw;
            max-width: 600px;
        }

        #result {
            width: 90vw;
            max-width: 600px;
        }
    </style>

    <script>
        function rumbleValidate() {
            const resultElement = document.getElementById('result');
            const schema = document.getElementById('schema').value;
            const instance = document.getElementById('instance').value;
            const schemaType = document.getElementById('selectSchemaType').value;
            const button = document.querySelector('button[type="submit"]');
            const buttonText = button.textContent;

            const schemaPrefix = schemaType === 'jsoundverbose' ? 'jsound verbose ' : '';
            const body = 'declare type local:mytype as ' + schemaPrefix + schema +
                '; validate type local:mytype {' + instance + '}';

            button.disabled = true;
            button.textContent = 'Validating…';
            resultElement.value = '';
            resultElement.className = '';

            fetch('/jsoniq', { method: 'POST', body })
                .then(response => response.json())
                .then(data => {
                    if (data.values) {
                        resultElement.className = 'valid';
                        resultElement.value = data.values.map(x => JSON.stringify(x)).join('\n');
                    } else if (data['error-message']) {
                        resultElement.className = 'invalid';

                        const msg = data['error-message'];
                        const start = msg.indexOf('Message');
                        const end = msg.indexOf('Metadata');
                        const excerpt = (start !== -1 && end !== -1 && end > start)
                            ? msg.substring(start, end)
                            : msg;

                        switch (data['error-code']) {
                            case 'XPST0003':
                                resultElement.value = 'A parsing error was raised, please check that you entered a correct schema.\n' + excerpt;
                                break;
                            case 'XQST0012':
                                resultElement.value = 'An invalid schema exception was raised, please check the validity of the schema you entered.';
                                break;
                            default:
                                resultElement.value = 'An error has occurred.\n' + excerpt;
                        }
                    }
                })
                .catch(err => {
                    resultElement.className = 'invalid';
                    resultElement.value = 'Network error: ' + err.message;
                })
                .finally(() => {
                    button.disabled = false;
                    button.textContent = buttonText;
                });

            return false;
        }
    </script>
</head>

<body>

<h1 style="font-weight: bold">JSound Validator - RumbleDB</h1>

<form onsubmit="return rumbleValidate()">
    <div style="margin: auto">
        <div id="panels" style="display: inline-block;">

            <div class="panel" style="float: left;">
                <h2 style="margin-top: 0">Schema</h2>

                <label for="selectSchemaType">Pick the schema type: </label>
                <select id="selectSchemaType" name="selectSchemaType" style="margin-bottom: 15px;">
                    <option value="jsoundcompact" selected>JSound compact</option>
                    <option value="jsoundverbose">JSound verbose</option>
                </select>

                <textarea id="schema" spellcheck="false" placeholder="Type your schema here" rows="20" required
                          style="display: block; margin: 5px">{"foo":"string"}</textarea>
            </div>

            <div class="panel" style="float: right">
                <h2 style="margin-top: 0; margin-bottom: 62px;">Instance</h2>

                <textarea id="instance" name="instance" placeholder="Type your instance here" rows="20" required
                          style="display: block; margin: 5px" aria-label="Instance">{"foo":"bar"}</textarea>
            </div>

        </div>
    </div>

    <button type="submit" style="margin: 0 auto; padding: 10px">
        Validate with RumbleDB 2.1.0
    </button>
</form>

<h2>Results</h2>
<textarea id="result" placeholder="Results will appear here." rows="15" readonly aria-label="Results"></textarea>

</body>
</html>
