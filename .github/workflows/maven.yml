    - name: Install with Maven
      run: mvn install -DskipTests -Dgpg.skip --quiet
    - name: Compile with Maven
      run: mvn clean compile assembly:single
    - name: Bugs
      run: mvn -Dtest=Bugs test  || true
    - name: NativeFLWORRuntimeTests
      run: mvn -Dtest=NativeFLWORRuntimeTests test  || true
    - name: NativeFLWORRuntimeTestsNativeDeactivated
      run: mvn -Dtest=NativeFLWORRuntimeTestsNativeDeactivated test  || true
    - name: NativeFLWORRuntimeTestsDataFramesDeactivated
      run: mvn -Dtest=NativeFLWORRuntimeTestsDataFramesDeactivated test  || true
    - name: NativeFLWORRuntimeTestsParallelismDeactivated
      run: mvn -Dtest=NativeFLWORRuntimeTestsParallelismDeactivated test  || true
    - name: MLTests
      run: mvn -Dtest=MLTests test  || true
    - name: MLTestsNativeDeactivated
      run: mvn -Dtest=MLTestsNativeDeactivated test  || true

  tests4:

    runs-on: ubuntu-latest

    steps:
