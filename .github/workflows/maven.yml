# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on: push

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
        distribution: adopt
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Install with Maven
      run: mvn install -DskipTests -Dgpg.skip --quiet
    - name: Compile with Maven
      run: mvn clean compile assembly:single
    - name: Spotless check
      run: mvn spotless:check
    - name: FrontendTests
      run: mvn -Dtest=FrontendTests test  || true
    - name: RuntimeTests
      run: mvn -Dtest=RuntimeTests test  || true
    - name: RuntimeTestsNoParallelism
      run: mvn -Dtest=RuntimeTestsNoParallelism test  || true
    - name: RuntimeTestsNoInlining
      run: mvn -Dtest=RuntimeTestsNoInlining test  || true
    - name: StaticTypeTests
      run: mvn -Dtest=StaticTypeTests test  || true
    - name: JavaAPITest
      run: mvn -Dtest=JavaAPITest test  || true
    - name: Copying artefacts
      run: mkdir staging && cp target/*.jar staging
    - name: Package
      uses: actions/upload-artifact@v4
      with:
        name: Package
        path: staging

  tests2:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
        distribution: adopt
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Install with Maven
      run: mvn install -DskipTests -Dgpg.skip --quiet
    - name: Compile with Maven
      run: mvn clean compile assembly:single
    - name: SparkRuntimeTests
      run: mvn -Dtest=SparkRuntimeTests test  || true
    - name: SparkRuntimeTestsNativeDeactivated
      run: mvn -Dtest=SparkRuntimeTestsNativeDeactivated test  || true
    - name: SparkRuntimeTestsDataFramesDeactivated
      run: mvn -Dtest=SparkRuntimeTestsDataFramesDeactivated test  || true
    - name: SparkRuntimeTestsParallelismDeactivated
      run: mvn -Dtest=SparkRuntimeTestsParallelismDeactivated test  || true

  tests3:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
